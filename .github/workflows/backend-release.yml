name: Backend Production Artifact

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  push:
    tags:
      - "backend-v*"
  workflow_dispatch:

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-backend-artifact:
    name: Build backend wheel/sdist
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: |
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build twine
          python -m pip install -e ".[dev]"

      - name: Run backend verification
        run: |
          python scripts/validate_providers.py
          python scripts/check_no_secrets.py
          pytest -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Twine metadata check
        run: python -m twine check dist/*

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-hub-backend-${{ github.sha }}
          path: backend/dist/*
          if-no-files-found: error
          retention-days: 14
