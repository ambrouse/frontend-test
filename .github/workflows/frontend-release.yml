name: Frontend Production Artifact

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  push:
    tags:
      - "frontend-v*"
  workflow_dispatch:

concurrency:
  group: frontend-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build-artifact:
    name: Build deployable frontend artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: |
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifact
          mkdir -p artifact/.next artifact/public
          cp -R .next/standalone artifact/
          cp -R .next/static artifact/.next/static
          cp -R public/. artifact/public/
          cp package.json package-lock.json artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-hub-frontend-${{ github.sha }}
          path: frontend/artifact
          if-no-files-found: error
          retention-days: 14
