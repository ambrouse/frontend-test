name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /usr/local/bin

      - name: Run actionlint
        run: actionlint -color

  frontend:
    name: Frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  frontend-security:
    name: Frontend dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=moderate

  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Seed provider fixtures
        run: python scripts/seed_providers.py

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy typecheck
        run: mypy app

      - name: Validate provider manifests
        run: python scripts/validate_providers.py

      - name: Secret scan
        run: python scripts/check_no_secrets.py

      - name: Backend tests with coverage gate
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=75

      - name: Provider dry-run lifecycle
        run: python scripts/provider_dry_run_lifecycle.py

      - name: Warm latency benchmark
        run: python scripts/benchmark_latency.py --iterations 100 --warmup 20 --threshold-ms 100

      - name: OpenAPI smoke check
        run: python -c "from app.main import app; import json; print(json.dumps(app.openapi())[:200])"

      - name: Build backend package
        run: |
          python -m pip install build
          python -m build

      - name: Audit Python dependencies
        if: runner.os == 'Linux'
        run: pip-audit --skip-editable

  provider-scripts:
    name: Provider script syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Root bash syntax
        run: bash -n setup.sh

      - name: Provider bash syntax
        run: find providers -path "*/scripts/linux/*.sh" -print0 | xargs -0 -n1 bash -n

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $scripts = @(Get-Item setup.ps1) + @(Get-ChildItem providers -Recurse -Filter *.ps1)
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
          }
