name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "providers/**"
      - ".github/workflows/**"
      - "docs/**"
      - "plans/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "providers/**"
      - ".github/workflows/**"
      - "docs/**"
      - "plans/**"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
          - name: Windows x64
            runner: windows-2025
          - name: Windows ARM64
            runner: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  dependency-audit:
    name: Production dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit all dependencies
        run: npm audit --audit-level=moderate

  backend:
    name: Backend production gates
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
          - name: Windows x64
            runner: windows-2025

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev]"

      - name: Seed provider fixtures
        run: python scripts/seed_providers.py

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy typecheck
        run: mypy app

      - name: Validate provider manifests
        run: python scripts/validate_providers.py

      - name: Secret scan
        run: python scripts/check_no_secrets.py

      - name: Run backend tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Generate OpenAPI schema
        run: python -c "from app.main import app; import json; print(json.dumps(app.openapi())[:200])"

      - name: Audit Python dependencies
        if: runner.os == 'Linux'
        run: pip-audit --skip-editable

  provider-scripts:
    name: Provider script validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: |
          bash -n setup.sh
          find providers -path "*/scripts/linux/*.sh" -print0 | xargs -0 -n1 bash -n

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $scripts = @(Get-Item setup.ps1) + @(Get-ChildItem providers -Recurse -Filter *.ps1)
          $scripts | ForEach-Object {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
          }
